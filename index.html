<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#041620" />
<title>Deep Aquarium</title>
<link rel="stylesheet" href="./style.css" />
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <canvas id="stage" aria-label="3D aquarium"></canvas>

  <div id="hint" class="hint">tap to enable sound</div>

  <div id="ui" class="ui">
    <div class="ui-body">
      <div class="group species" role="group" aria-label="creatures">
        <button class="btn species-btn leviathan-btn" data-species="leviathan" title="Leviathan">リヴァイアサン</button>
        <button class="btn species-btn" data-species="jellyfish" title="Jellyfish">クラゲ</button>
        <button class="btn species-btn" data-species="coelacanth" title="Coelacanth">シーラカンス</button>
        <button class="btn species-btn" data-species="trilobite" title="Trilobite">三葉虫</button>
        <button class="btn species-btn" data-species="isopod" title="Giant isopod">ダイオウグソクムシ</button>
        <button class="btn species-btn" data-species="gar" title="Alligator gar">アリゲーターガー</button>
        <button class="btn species-btn" data-species="pirarucu" title="Pirarucu">ピラルク</button>
      </div>
      <div class="group toggles">
        <button class="btn" id="btn-ambient" aria-pressed="true" title="Ambient mode">鑑賞 ON</button>
        <button class="btn" id="btn-sound" aria-pressed="false" title="Sound">音 OFF</button>
        <button class="btn" id="btn-bright" title="Brightness">明 標準</button>
        <button class="btn accent" id="btn-feed" title="Drop food">餌</button>
      </div>
    </div>
    <button class="btn btn-toggle" id="btn-ui-toggle" aria-expanded="true" aria-controls="ui" title="メニューを閉じる">▾</button>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
